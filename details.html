<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل المنطقة</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>تفاصيل المنطقة</h1>

    <nav>
       <a href="index.html">الرئيسية</a>
        <a href="regions.html">معرض المناطق</a>
        <a href="login.html">دخول المشرف</a>
        <button class="mode-btn" onclick="toggleMode()">الوضع الليلي</button>
    </nav>
    
</header>

<main>
  <section class="details-page">

    <!-- صورة كبيرة -->
    <img id="place-image" class="cover-img">

    <!-- النص -->
    <div class="details-content">
        <h2 id="place-name"></h2>
        <p id="place-description"></p>

        <!-- معلومات سريعة -->
        <div class="quick-box">
            <h3>معلومات سريعة</h3>
            <ul id="place-info"></ul>
        </div>

        <!-- المعالم -->
        <h3>أبرز المعالم</h3>
        <ul id="place-landmarks"></ul>

        <!-- معرض الصور -->
        <h3>معرض الصور</h3>
        <div id="place-gallery" class="gallery"></div>
    </div>

</section>
</main>

<footer>
    © اكتشف السعودية - جامعة الملك سعود
</footer>

<script src="js/script.js"></script>

</body>
</html>
