<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل المنطقة</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <div class="logo">اكتشف السعودية</div>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="regions.html">معرض المناطق</a>
        <a href="login.html">دخول المشرف</a>
        <button class="mode-btn" onclick="toggleMode()">الوضع الليلي</button>
    </nav>
</header>

<main>
    <section class="details-page" id="place-details">

        <img id="place-image" class="cover-img" src="" alt="صورة المنطقة">

        <div class="details-content">
            <h2 id="place-name"></h2>
            <p id="place-description"></p>

            <div class="quick-box">
                <h3>معلومات سريعة</h3>
                <ul id="place-info"></ul>
            </div>

            <h3>أبرز المعالم</h3>
            <ul id="place-landmarks"></ul>

            <h3>معرض الصور</h3>
            <div id="place-gallery" class="details-gallery"></div>
        </div>

    </section>
</main>

<footer>
    © اكتشف السعودية - جامعة الملك سعود
</footer>

<script src="js/script.js"></script>
</body>
</html>
